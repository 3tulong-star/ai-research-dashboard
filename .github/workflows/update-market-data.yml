name: Update market snapshot

on:
  workflow_dispatch:
  schedule:
    # 19:30 Asia/Shanghai = 11:30 UTC，周一至周五执行
    - cron: "30 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-market-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-data.txt

      - name: Install data collector
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-data.txt

      - name: Update selected-pool snapshot
        run: sh scripts/run_data_update.sh

      - name: Commit snapshot when changed
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-snapshot.json

          if git diff --cached --quiet; then
            echo "Snapshot did not change."
            exit 0
          fi

          git commit -m "chore(data): update market snapshot"
          git push origin "HEAD:${TARGET_BRANCH}"
